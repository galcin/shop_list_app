  <circle cx="56" cy="268" r="40" fill="#E8F5EE"/>
  <text x="56" y="277" font-size="30" text-anchor="middle">🍎</text>
  <text x="112" y="258" font-size="15" font-weight="700" fill="#1A1A1A">Apples</text>
