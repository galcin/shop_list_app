  <circle cx="350" cy="716" r="28" fill="#4CAF82"/>
  <line x1="350" y1="704" x2="350" y2="728" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="338" y1="716" x2="362" y2="716" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>

